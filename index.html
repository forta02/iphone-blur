<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera Mode Potret</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }
    video, canvas {
      position: absolute;
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 16px;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type=range] {
      width: 160px;
      accent-color: #00bfff;
    }
    #fValue {
      font-weight: bold;
      font-size: 1rem;
      min-width: 50px;
    }
    #loading {
      font-size: 1.2rem;
      color: #00bfff;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ Memuat model potret...</div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <label>Aperture (F):</label>
    <input type="range" id="blurRange" min="1.4" max="8" step="0.1" value="2.0">
    <span id="fValue">f/2.0</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/segmentation@0.1.3"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const blurRange = document.getElementById('blurRange');
    const fValue = document.getElementById('fValue');
    const loading = document.getElementById('loading');

    let model;
    let stream;

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      video.srcObject = stream;
      return new Promise(res => video.onloadedmetadata = res);
    }

    async function loadModel() {
      // Model segmentasi manusia (lebih tajam dari bodypix)
      model = await segmentation.SelfieSegmentation.load({
        modelType: 'landscape'
      });
    }

    async function renderFrame() {
      const f = parseFloat(blurRange.value);
      const blurAmount = Math.max(1, 30 / f);

      const segmentationData = await model.segmentPeople(video);
      const mask = segmentationData[0].mask;

      // Render video ke canvas
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Ambil latar & buat blur
      ctx.save();
      ctx.filter = `blur(${blurAmount}px)`;
      ctx.globalCompositeOperation = 'destination-over';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      // Gambar wajah / tubuh tetap tajam
      ctx.globalCompositeOperation = 'destination-in';
      ctx.drawImage(mask, 0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'destination-over';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      requestAnimationFrame(renderFrame);
    }

    blurRange.addEventListener('input', () => {
      fValue.textContent = `f/${blurRange.value}`;
    });

    (async () => {
      await startCamera();
      await loadModel();

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      loading.style.display = 'none';
      renderFrame();
    })();
  </script>
</body>
</html>
