<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Portrait Blur — Simple Web</title>
<style>
  :root{--bg:#000;--accent:#ff4757;--muted:#e6eef8}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--muted);font-family:system-ui,Segoe UI,Roboto,Arial}
  .stage{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
  video#src{display:none}
  canvas#out{width:100%;height:100%;object-fit:cover;display:block}
  /* UI */
  .ui{position:fixed;left:0;right:0;bottom:14px;display:flex;justify-content:center;gap:12px;align-items:center;pointer-events:auto;padding:0 12px}
  .btn{background:rgba(255,255,255,0.06);border:none;color:var(--muted);padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600}
  .rec{width:78px;height:78px;border-radius:50%;background:linear-gradient(180deg,var(--accent),#c0333a);border:4px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;color:white;font-size:22px}
  input[type=range]{width:180px}
  .topbar{position:fixed;top:12px;left:12px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.35);padding:6px 10px;border-radius:10px;font-weight:600}
  .rightcontrols{position:fixed;right:12px;top:12px;display:flex;flex-direction:column;gap:8px}
  .small{padding:8px 10px;border-radius:8px}
  #focusMarker{position:absolute;border:2px solid rgba(255,255,255,0.9);width:120px;height:120px;border-radius:16px;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 6px 18px rgba(0,0,0,0.6)}
  #download{display:none}
  @media(max-width:520px){ input[type=range]{width:120px} .rec{width:66px;height:66px} #focusMarker{width:92px;height:92px} }
</style>
</head>
<body>
  <div class="stage">
    <video id="src" autoplay playsinline muted></video>
    <canvas id="out"></canvas>
    <div id="focusMarker" aria-hidden="true"></div>
    <div class="topbar">Portrait Blur (simulated)</div>
    <div class="rightcontrols">
      <button id="switchBtn" class="btn small" title="Ganti kamera">🔄</button>
      <button id="gridBtn" class="btn small" title="Toggle Grid">🔲</button>
    </div>
  </div>

  <div class="ui" role="toolbar" aria-label="Controls">
    <label style="display:flex;align-items:center;gap:8px">
      Aperture
      <input id="fSlider" type="range" min="1.4" max="16" step="0.1" value="2.8">
      <span id="fLabel">f/2.8</span>
    </label>

    <button id="recBtn" class="rec" title="Rekam/Stop">●</button>

    <a id="download" class="btn" download="portrait-blur.webm">⬇️ Simpan</a>
  </div>

<script>
/* Simple simulated portrait blur web app
   - Full background blur (no AI)
   - Focus window (rounded rect) showing sharp video
   - Tap/click to move focus
   - f-slider controls blur intensity
   - switch camera, record canvas (+ audio) and download .webm
   - responsive + auto-rotate by listening to resize/orientation
*/

const src = document.getElementById('src');
const out = document.getElementById('out');
const ctx = out.getContext('2d', { alpha: false });

const fSlider = document.getElementById('fSlider');
const fLabel = document.getElementById('fLabel');
const recBtn = document.getElementById('recBtn');
const download = document.getElementById('download');
const switchBtn = document.getElementById('switchBtn');
const focusMarker = document.getElementById('focusMarker');
const gridBtn = document.getElementById('gridBtn');

let stream = null;
let usingFront = false;
let focus = { x: 0.5, y: 0.5 }; // normalized coords
let focusRadius = 0.32; // fraction of min dimension
let recorder = null;
let recordedChunks = [];
let gridOn = false;

function mapFtoBlurPx(f){
  // f in [1.4..16] => blur px [32..0] (lower f = stronger blur)
  const max = 32, min = 0;
  const t = (f - 1.4) / (16 - 1.4);
  return (1 - t) * max + t * min;
}

fSlider.addEventListener('input', () => {
  fLabel.textContent = 'f/' + parseFloat(fSlider.value).toFixed(1);
});

async function startCamera(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  const constraints = {
    video: { facingMode: usingFront ? 'user' : 'environment', width:{ideal:1280}, height:{ideal:720} },
    audio: true
  };
  try{
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    src.srcObject = stream;
    // keep audio track (recorder uses it)
    await src.play();
    resizeCanvas();
    requestAnimationFrame(drawFrame);
  }catch(e){
    alert('Gagal mengakses kamera: ' + (e.message || e));
    console.error(e);
  }
}

function resizeCanvas(){
  // handle orientation/resizing: choose video natural size
  const vw = src.videoWidth || 1280;
  const vh = src.videoHeight || 720;
  out.width = vw;
  out.height = vh;
  // update focus marker size & pos
  updateFocusMarker();
}

function updateFocusMarker(){
  focusMarker.style.left = (focus.x * 100) + '%';
  focusMarker.style.top = (focus.y * 100) + '%';
  const minDim = Math.min(out.width, out.height);
  const size = Math.max(64, Math.floor(minDim * focusRadius));
  focusMarker.style.width = size + 'px';
  focusMarker.style.height = size + 'px';
  focusMarker.style.borderRadius = Math.max(8, Math.floor(size * 0.12)) + 'px';
  focusMarker.style.display = 'block';
}

function drawRoundedClip(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawGrid(){
  if(!gridOn) return;
  const cols = 3, rows = 3;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for(let i=1;i<cols;i++){
    const x = (out.width/cols) * i;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,out.height); ctx.stroke();
  }
  for(let j=1;j<rows;j++){
    const y = (out.height/rows) * j;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(out.width,y); ctx.stroke();
  }
  ctx.restore();
}

function drawFrame(){
  if(!src || src.readyState < 2){ requestAnimationFrame(drawFrame); return; }
  // compute blur
  const blurPx = mapFtoBlurPx(parseFloat(fSlider.value));

  // draw blurred full frame
  ctx.save();
  ctx.filter = `blur(${blurPx}px) brightness(1.03) contrast(1.02) saturate(1.05)`;
  ctx.drawImage(src, 0, 0, out.width, out.height);
  ctx.restore();

  // draw sharp area on top (rounded rect)
  const minDim = Math.min(out.width, out.height);
  const w = minDim * focusRadius;
  const h = w * (out.height / out.width) * 1.05;
  const cx = focus.x * out.width;
  const cy = focus.y * out.height;
  const x = cx - w/2;
  const y = cy - h/2;
  const r = Math.min(40, w * 0.08);

  // clip and draw sharp video inside
  ctx.save();
  drawRoundedClip(ctx, x, y, w, h, r);
  ctx.clip();
  ctx.drawImage(src, 0, 0, out.width, out.height);
  ctx.restore();

  // subtle vignette and warm tone overlay for cinematic look
  const grad = ctx.createRadialGradient(cx, cy, Math.min(w,h)/2, out.width/2, out.height/2, Math.max(out.width,out.height));
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.22)');
  ctx.fillStyle = grad; ctx.fillRect(0,0,out.width,out.height);

  ctx.fillStyle = 'rgba(255,180,120,0.03)';
  ctx.fillRect(0,0,out.width,out.height);

  // optional grid
  drawGrid();

  requestAnimationFrame(drawFrame);
}

/* click/tap to change focus */
out.addEventListener('click', (e) => {
  const rect = out.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  focus.x = Math.min(0.98, Math.max(0.02, x));
  focus.y = Math.min(0.98, Math.max(0.02, y));
  updateFocusMarker();
});

/* toggle grid */
gridBtn.addEventListener('click', () => { gridOn = !gridOn; gridBtn.style.background = gridOn ? 'rgba(255,255,255,0.06)' : ''; });

/* switch camera */
switchBtn.addEventListener('click', async () => {
  usingFront = !usingFront;
  await startCamera();
});

/* Recording logic */
recBtn.addEventListener('click', () => {
  if(recorder && recorder.state === 'recording') {
    recorder.stop();
    recBtn.classList.remove('recording');
    recBtn.textContent = '●';
  } else {
    startRecording();
  }
});

async function startRecording(){
  recordedChunks = [];
  const canvasStream = out.captureStream(30); // canvas video (with effect)
  const combined = new MediaStream();
  canvasStream.getVideoTracks().forEach(t => combined.addTrack(t));
  // add audio track if available in camera stream
  if(stream && stream.getAudioTracks().length){
    stream.getAudioTracks().forEach(t => combined.addTrack(t));
  } else {
    // fallback request mic separately
    try{
      const mic = await navigator.mediaDevices.getUserMedia({ audio: true });
      mic.getAudioTracks().forEach(t => combined.addTrack(t));
    }catch(e){}
  }

  // choose mime
  let options = { mimeType: 'video/webm;codecs=vp9,opus' };
  if(!MediaRecorder.isTypeSupported(options.mimeType)){
    options = { mimeType: 'video/webm;codecs=vp8,opus' };
    if(!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
  }

  try{
    recorder = new MediaRecorder(combined, options);
  }catch(e){
    recorder = new MediaRecorder(combined);
  }

  recorder.ondataavailable = e => { if(e.data && e.data.size) recordedChunks.push(e.data); };
  recorder.onstop = onRecordingStop;
  recorder.start(200);

  recBtn.classList.add('recording');
  recBtn.textContent = '■';
}

function onRecordingStop(){
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  download.href = url;
  download.style.display = 'inline-block';
  // auto-trigger download suggestion (optional — commented)
  // const a = document.createElement('a'); a.href = url; a.download='portrait-blur.webm'; a.click();
}

/* auto-rotate / responsiveness */
window.addEventListener('resize', () => {
  // small debounce
  clearTimeout(window._rb);
  window._rb = setTimeout(() => {
    try{ resizeCanvas(); }catch(e){}
  }, 120);
});

/* init */
(async () => {
  try{
    await startCamera();
    // wait for video metadata
    src.addEventListener('loadedmetadata', () => { resizeCanvas(); updateFocusMarker(); });
  }catch(e){
    alert('Tidak bisa buka kamera: ' + (e.message || e));
  }
})();

/* cleanup */
window.addEventListener('pagehide', () => {
  if(stream) stream.getTracks().forEach(t => t.stop());
  if(recorder && recorder.state === 'recording') recorder.stop();
});
</script>
</body>
</html>
