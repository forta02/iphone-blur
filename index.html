<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera Mode Potret iPhone</title>
<style>
  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:"Poppins",sans-serif;
    color:white;
  }
  video,canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  #ui{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding-bottom:25px;
    background:linear-gradient(to top,rgba(0,0,0,0.5),transparent);
  }
  .slider-area{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  input[type=range]{
    width:160px;
    accent-color:#ffd700;
  }
  #fVal{font-weight:bold;min-width:50px;}
  .buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
  }
  .btn-round{
    width:70px;height:70px;
    border-radius:50%;
    border:4px solid white;
    background:rgba(255,255,255,0.1);
    cursor:pointer;
    transition:0.2s;
  }
  .btn-round.recording{
    background:#ff3333;
    border-color:#ff3333;
  }
  #switchCam{
    position:absolute;
    right:20px;
    bottom:35px;
    width:40px;height:40px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
  }
  #loading{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    color:#ffd700;
    font-size:1.2rem;
    animation:blink 1s infinite;
  }
  @keyframes blink{50%{opacity:0.4;}}
</style>
</head>
<body>
  <div id="loading">📸 Memuat mode potret...</div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div class="slider-area">
      <span>Aperture:</span>
      <input type="range" id="blurRange" min="1.4" max="8" step="0.1" value="2.0">
      <span id="fVal">f/2.0</span>
    </div>
    <div class="buttons">
      <div id="recordBtn" class="btn-round"></div>
    </div>
    <button id="switchCam">🔄</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/segmentation@0.1.3"></script>
<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const blurRange=document.getElementById("blurRange");
const fVal=document.getElementById("fVal");
const recordBtn=document.getElementById("recordBtn");
const switchCam=document.getElementById("switchCam");
const loading=document.getElementById("loading");

let model,stream,facing="environment";
let recorder,chunks=[],recording=false;

async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing}});
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
}
async function loadModel(){
  model=await segmentation.SelfieSegmentation.load({modelType:"landscape"});
}
async function draw(){
  const f=parseFloat(blurRange.value);
  const blurAmt=Math.max(1,30/f);
  const seg=await model.segmentPeople(video);
  const mask=seg[0].mask;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.filter=`blur(${blurAmt}px)`;
  ctx.globalCompositeOperation="destination-over";
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  ctx.restore();
  ctx.globalCompositeOperation="destination-in";
  ctx.drawImage(mask,0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="destination-over";
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  requestAnimationFrame(draw);
}
blurRange.oninput=()=>{fVal.textContent=`f/${blurRange.value}`;};

switchCam.onclick=async()=>{
  facing=facing==="environment"?"user":"environment";
  await startCam();
};

recordBtn.onclick=()=>{
  if(!recording)startRec();else stopRec();
};
function startRec(){
  const s=canvas.captureStream(30);
  recorder=new MediaRecorder(s,{mimeType:"video/webm"});
  chunks=[];
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=save;
  recorder.start();
  recording=true;
  recordBtn.classList.add("recording");
}
function stopRec(){
  recording=false;
  recorder.stop();
  recordBtn.classList.remove("recording");
}
function save(){
  const blob=new Blob(chunks,{type:"video/webm"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="mode-potret.mp4";a.click();
  URL.revokeObjectURL(url);
}
(async()=>{
  await startCam();
  await loadModel();
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  loading.style.display="none";
  draw();
})();
</script>
</body>
</html>
